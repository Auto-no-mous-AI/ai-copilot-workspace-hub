name: Release Bundle

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create workspace bundle
        run: |
          mkdir -p dist
          tar -czf dist/ai-copilot-workspace-hub.tar.gz README.md docs scripts repos.json package.json

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-copilot-workspace-hub
          path: dist/ai-copilot-workspace-hub.tar.gz
