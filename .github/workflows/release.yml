name: Release Bundle

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create bundle
        run: |
          mkdir -p dist
          tar -czf dist/ai-copilot-workspace-hub.tar.gz README.md docs scripts repos.json package.json package-lock.json

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-copilot-workspace-hub
          path: dist/ai-copilot-workspace-hub.tar.gz

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-copilot-workspace-hub.tar.gz
          generate_release_notes: true
