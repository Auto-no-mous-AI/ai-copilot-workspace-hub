changelog:
  exclude:
    labels:
      - skip-changelog
      - internal
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Documentation
      labels:
        - docs
    - title: CI And Tooling
      labels:
        - ci
        - tooling
    - title: Other Changes
      labels:
        - '*'
